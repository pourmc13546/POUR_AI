<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 진단 서비스 신청서 · POUR솔루션</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #e8ecf2;
    font-family: 'Noto Sans KR', sans-serif;
    color: #1a1e2e;
    min-height: 100vh;
  }

  .page-wrap {
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
    background: #f0f2f6;
  }

  /* ── 헤더 ── */
  .header {
    background: linear-gradient(140deg, #192540 0%, #243660 55%, #1f3055 100%);
    padding: 32px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 11px;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.88);
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.03em;
    line-height: 1.3;
  }
  .header-desc {
    margin-top: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.58);
    line-height: 1.75;
  }
  .header-deco {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 130px;
    height: 120px;
    pointer-events: none;
  }

  /* ── 카드 ── */
  .card {
    background: #fff;
    margin: 12px 12px;
    border-radius: 12px;
    border: 1px solid #e2e7ef;
    overflow: hidden;
  }

  /* ── 필드 ── */
  .field {
    padding: 14px 16px;
    border-bottom: 1px solid #edf0f5;
    transition: background 0.15s;
  }
  .field:last-child { border-bottom: none; }
  .field:focus-within .field-label { color: #3d6abf; }

  .field-label {
    font-size: 11px;
    font-weight: 700;
    color: #8a96ae;
    margin-bottom: 6px;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .req { color: #3d6abf; }

  /* 2열 필드 */
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid #edf0f5;
  }
  .field-row:last-child { border-bottom: none; }
  @media (max-width: 360px) {
    .field-row { grid-template-columns: 1fr; }
    .field-row .col:first-child { border-right: none !important; border-bottom: 1px solid #edf0f5; }
  }
  .field-row .col {
    padding: 14px 16px;
    min-width: 0;
  }
  .field-row .col:first-child { border-right: 1px solid #edf0f5; }
  .field-row .col:focus-within .field-label { color: #3d6abf; }

  /* 인풋 공통 */
  .field input,
  .field textarea,
  .field-row .col input {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #1a1e2e;
    caret-color: #3d6abf;
    padding: 0;
    line-height: 1.5;
    -webkit-appearance: none;
    display: block;
    min-width: 0;
  }
  .field input::placeholder,
  .field textarea::placeholder,
  .field-row .col input::placeholder {
    color: #bcc5d4;
    font-weight: 400;
    font-size: 14px;
  }
  .field textarea { resize: none; min-height: 80px; }

  /* 서브 라벨 (▶ 항목) */
  .sub-field {
    padding: 12px 16px 13px;
    border-bottom: 1px solid #edf0f5;
    background: #fafbfc;
    transition: background 0.15s;
  }
  .sub-field:last-child { border-bottom: none; }
  .sub-field:focus-within { background: #f5f8ff; }
  .sub-field:focus-within .sub-label { color: #3d6abf; }

  .sub-label {
    font-size: 11px;
    font-weight: 700;
    color: #a0aabf;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.02em;
  }
  .sub-label .arrow {
    color: #3d6abf;
    font-size: 9px;
  }
  .sub-field input {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #1a1e2e;
    caret-color: #3d6abf;
    padding: 0;
    line-height: 1.5;
    -webkit-appearance: none;
    display: block;
  }
  .sub-field input::placeholder {
    color: #bcc5d4;
    font-weight: 400;
    font-size: 14px;
  }

  /* ── 제출 버튼 ── */
  .btn-wrap { padding: 6px 12px 40px; }
  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, #1c2b4a 0%, #2c4270 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    -webkit-appearance: none;
    letter-spacing: -0.02em;
    transition: opacity 0.15s;
  }
  .btn-submit:active { opacity: 0.85; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-note {
    text-align: center;
    font-size: 11px;
    color: #a8b3c8;
    padding: 0 14px 10px;
    line-height: 1.7;
  }

  /* ── 성공 모달 ── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,18,40,0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 18px;
    padding: 36px 24px 28px;
    text-align: center;
    max-width: 320px;
    width: 100%;
    animation: modalIn 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  @keyframes modalIn {
    from { transform: scale(0.88) translateY(20px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .modal-icon {
    width: 68px; height: 68px;
    background: #eef2fb;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .modal-title { font-size: 18px; font-weight: 700; color: #1a1e2e; margin-bottom: 10px; letter-spacing: -0.02em; }
  .modal-desc  { font-size: 13.5px; color: #6b7a99; line-height: 1.75; margin-bottom: 26px; }
  .modal-btn {
    width: 100%;
    background: #1c2b4a;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .modal-btn:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="page-wrap">

<!-- 헤더 -->
<div class="header">
  <svg class="header-deco" viewBox="0 0 130 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="76" width="20" height="44" fill="white" opacity="0.07"/>
    <rect x="3" y="83" width="5" height="5" fill="white" opacity="0.14"/>
    <rect x="12" y="83" width="5" height="5" fill="white" opacity="0.14"/>
    <rect x="3" y="93" width="5" height="5" fill="white" opacity="0.14"/>
    <rect x="12" y="93" width="5" height="5" fill="white" opacity="0.14"/>
    <rect x="24" y="38" width="34" height="82" fill="white" opacity="0.08"/>
    <line x1="32" y1="38" x2="32" y2="120" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="42" y1="38" x2="42" y2="120" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="50" y1="38" x2="50" y2="120" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="24" y1="52" x2="58" y2="52" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="24" y1="64" x2="58" y2="64" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="24" y1="76" x2="58" y2="76" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="24" y1="88" x2="58" y2="88" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="24" y1="100" x2="58" y2="100" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="41" y1="30" x2="41" y2="38" stroke="white" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round"/>
    <circle cx="41" cy="29" r="2" fill="white" opacity="0.22"/>
    <rect x="96" y="54" width="28" height="66" fill="white" opacity="0.07"/>
    <line x1="104" y1="54" x2="104" y2="120" stroke="white" stroke-width="0.5" stroke-opacity="0.13"/>
    <line x1="114" y1="54" x2="114" y2="120" stroke="white" stroke-width="0.5" stroke-opacity="0.13"/>
    <line x1="96" y1="66" x2="124" y2="66" stroke="white" stroke-width="0.5" stroke-opacity="0.13"/>
    <line x1="96" y1="78" x2="124" y2="78" stroke="white" stroke-width="0.5" stroke-opacity="0.13"/>
    <line x1="96" y1="90" x2="124" y2="90" stroke="white" stroke-width="0.5" stroke-opacity="0.13"/>
    <line x1="96" y1="102" x2="124" y2="102" stroke="white" stroke-width="0.5" stroke-opacity="0.13"/>
    <line x1="0" y1="75" x2="130" y2="75" stroke="white" stroke-width="0.8" stroke-opacity="0.12"/>
    <line x1="8" y1="52" x2="88" y2="52" stroke="white" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="6 4"/>
    <circle cx="10" cy="52" r="3" fill="white" opacity="0.4"/>
    <circle cx="86" cy="52" r="3" fill="white" opacity="0.4"/>
    <circle cx="72" cy="26" r="13" fill="white" opacity="0.12" stroke="white" stroke-width="0.8" stroke-opacity="0.3"/>
    <path d="M66 26L70.5 31L79 20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </svg>
  <div class="header-badge">🏢 POUR솔루션</div>
  <h1>AI 진단 서비스<br>신청서</h1>
  <p class="header-desc">아래 정보를 입력하시면<br>담당자가 일정 확인 후 연락드립니다.</p>
</div>

<!-- 메인 카드 -->
<div class="card">

  <!-- 요청 회사 / 담당자 -->
  <div class="field-row">
    <div class="col" id="wrap-company">
      <div class="field-label">요청 회사 <span class="req">*</span></div>
      <input type="text" id="company" placeholder="ABC건설" autocomplete="organization">
    </div>
    <div class="col" id="wrap-manager">
      <div class="field-label">담당자 <span class="req">*</span></div>
      <input type="text" id="manager" placeholder="홍길동" autocomplete="name">
    </div>
  </div>

  <!-- 연락처 -->
  <div class="field" id="wrap-phone">
    <div class="field-label">연락처 <span class="req">*</span></div>
    <input type="tel" id="phone" placeholder="010-" autocomplete="tel">
  </div>

  <!-- 촬영 대상지 주소 -->
  <div class="field" id="wrap-address">
    <div class="field-label">촬영 대상지 주소 <span class="req">*</span></div>
    <input type="text" id="address" placeholder="주소 입력" autocomplete="street-address">
  </div>

  <!-- 대상 건물 / 구역 -->
  <div class="sub-field">
    <div class="sub-label"><span class="arrow">▶</span> 대상 건물 / 구역</div>
    <input type="text" id="building" placeholder="예) A동 외벽, 옥상, 지하주차장 입구">
  </div>

  <!-- 희망 진단 일정 -->
  <div class="sub-field" id="wrap-schedule">
    <div class="sub-label"><span class="arrow">▶</span> 희망 진단 일정 <span class="req">*</span></div>
    <input type="text" id="schedule" placeholder="예) 4/1~4/15 중 가능한 날짜">
  </div>

  <!-- 추가 요청사항 -->
  <div class="field">
    <div class="field-label">추가 요청사항</div>
    <textarea id="memo" placeholder="촬영 목적, 특이사항, 기타 전달 내용"></textarea>
  </div>

</div>

<p class="form-note">
  <span class="req">*</span> 필수 항목 &nbsp;|&nbsp; 입력하신 정보는 서비스 제공 목적으로만 사용됩니다
</p>

<div class="btn-wrap">
  <button class="btn-submit" id="submitBtn" onclick="submitForm()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
    요청서 제출하기
  </button>
</div>

</div><!-- /page-wrap -->

<!-- 성공 모달 -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-icon">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
        <circle cx="17" cy="17" r="16" fill="#eef2fb"/>
        <polyline points="10 17 14.5 22 24 11" stroke="#3d6abf" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="modal-title">요청이 완료되었습니다!</div>
    <div class="modal-desc">
      신청이 정상 접수되었습니다.<br>
      담당자가 일정 확인 후<br>
      <strong>빠른 시일 내</strong> 연락드리겠습니다.
    </div>
    <button class="modal-btn" onclick="closeModal()">확인</button>
  </div>
</div>

<script>
  const TOKEN      = 'pour2025!diag#secure';
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhH2pe1ibGBgzS9naU73UeojXQ3QoXYgS7Sbkup2r1x213DlJ3GlzwCoDn7vKX4nQDoQ/exec';

  const ALL_IDS = ['company','manager','phone','address','building','schedule','memo'];

  const REQUIRED = [
    { id: 'company',  wrap: 'wrap-company',  label: '요청 회사' },
    { id: 'manager',  wrap: 'wrap-manager',  label: '담당자' },
    { id: 'phone',    wrap: 'wrap-phone',    label: '연락처' },
    { id: 'address',  wrap: 'wrap-address',  label: '촬영 대상지 주소' },
    { id: 'schedule', wrap: 'wrap-schedule', label: '희망 진단 일정' },
  ];

  async function submitForm() {
    for (const f of REQUIRED) {
      const el = document.getElementById(f.id);
      if (!el.value.trim()) {
        el.focus();
        const wrap = document.getElementById(f.wrap);
        if (wrap) {
          wrap.style.background = '#fff5f5';
          setTimeout(() => { wrap.style.background = ''; }, 900);
        }
        return;
      }
    }

    const data = {
      token:    TOKEN,
      company:  document.getElementById('company').value.trim(),
      manager:  document.getElementById('manager').value.trim(),
      phone:    document.getElementById('phone').value.trim(),
      address:  document.getElementById('address').value.trim(),
      building: document.getElementById('building').value.trim(),
      schedule: document.getElementById('schedule').value.trim(),
      memo:     document.getElementById('memo').value.trim(),
    };

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span style="font-size:15px">제출 중...</span>';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(data)
      });

      ALL_IDS.forEach(id => { document.getElementById(id).value = ''; });
      document.getElementById('modalBg').classList.add('show');

    } catch (e) {
      alert('제출 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        요청서 제출하기
      `;
    }
  }

  function closeModal() {
    document.getElementById('modalBg').classList.remove('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
